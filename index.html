<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fablewild</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f1a12;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('forest.png');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-content {
  max-width: 700px;
}

.logo {
  width: 320px;
  margin-bottom: 20px;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: #f5e6b3;
}

/* MAIN CARD */
.container {
  max-width: 900px;
  margin: auto;
  padding: 80px 20px;
  text-align: center;
  background: #f6f4ef;
  border-radius: 20px;
  margin-top: -80px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin-bottom: 20px;
  color: #2f4f34;
}

p {
  font-size: 18px;
  line-height: 1.7;
  color: #4a4f4a;
}

/* DRAGON */
.dragon {
  width: 320px;
  margin: 30px auto;
  display: block;
}

/* EMAIL */
.email-box {
  margin-top: 30px;
}

input {
  padding: 16px;
  width: 65%;
  max-width: 320px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
}

button {
  padding: 16px 22px;
  margin-left: 10px;
  border: none;
  background: #2f4f34;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
}

button:hover {
  background: #243c28;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 40px;
  color: #bbb;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <img src="logo.png" class="logo">
    <div class="tagline">A soft place for stories to begin</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <h2>Meet the Woodland Dragon</h2>

  <img src="dragon.png" class="dragon">

  <p>
    At Fablewild, every creature is made to bring comfort, calm, and a little bit of magic into everyday life.
  </p>

  <p>
    From quiet moments to big adventures, your story begins here.
  </p>

  <div class="email-box">
    <input type="email" placeholder="Enter your email">
    <button>Join the Waitlist</button>
  </div>

</div>

<div class="footer">
  © Fablewild — Made for little dreamers
</div>

</body>
</html>
